<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise one by one vs promise.all</title>
</head>

<body>

    <script>
        // using one by one
        function delay(name, time) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve(`${name} done after ${time} msec`);
                }, time);
            });
        }

        async function oneByOne() {
            console.time("One by one");

            let result1 = await delay("Task 1", 2000);
            console.log(result1);

            let result2 = await delay("task 2", 1500);
            console.log(result2);

            let result3 = await delay("task 3", 1000);
            console.log(result3);

            console.timeEnd("One by one");
        }
        oneByOne();


        // using Promise.all

        async function allTogether(){
            console.time("Promise.all");

            let promises=[
                delay("task 1",2000),
                delay("task 2",1500),
                delay("task 3",1000)
            ];

            let result=await Promise.all(promises);

            console.log(result);
            console.timeEnd("Promise.all");
        }

         setTimeout(allTogether,5000);


    </script>
</body>

</html>
